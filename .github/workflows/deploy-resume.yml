name: Deploy Resume

on:
  push:
    branches:
      - main
    paths:
      - 'resume/**'   # only runs when resume/ files change

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Sync the resume/ directory to the S3 bucket.
      # --delete removes any files in S3 that no longer exist locally.
      - name: Deploy to S3
        run: |
          aws s3 sync resume/ s3://mathproblemguy.com/ --delete
